<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 성장 리포트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- 헤더 -->
      <header class="result-header">
        <div class="header-icon">🌸</div>
        <h1>나의 씨앗과 꽃 성장 리포트</h1>
        <p class="subtitle">그림책 『너는 어떤 씨앗이니?』 독후 활동 결과</p>
      </header>

      <!-- 총점 -->
      <div class="task-section" style="text-align:center;">
        <p style="font-size:0.9rem; color:#6b7280; margin-bottom:8px;">총점</p>
        <div class="total-score" id="totalScore">
          — <span>/ 20점</span>
        </div>
      </div>

      <!-- 레이더 차트 -->
      <div class="task-section">
        <h2>📊 항목별 성취도</h2>
        <div class="chart-wrapper">
          <canvas id="radarChart"></canvas>
        </div>

        <!-- 점수 카드 -->
        <div class="score-grid">
          <div class="score-card">
            <div class="label">① 자기 경험 연계 서술</div>
            <div class="score" id="scoreReflection">—</div>
            <div class="level" id="levelReflection">—</div>
          </div>
          <div class="score-card">
            <div class="label">② 그림-글 연결 일관성</div>
            <div class="score" id="scoreCoherence">—</div>
            <div class="level" id="levelCoherence">—</div>
          </div>
          <div class="score-card">
            <div class="label">③ 도형 의미 부여 및 설명 일관성</div>
            <div class="score" id="scoreSymbolism">—</div>
            <div class="level" id="levelSymbolism">—</div>
          </div>
          <div class="score-card">
            <div class="label">④ 과제 조건 준수</div>
            <div class="score" id="scoreFormat">—</div>
            <div class="level" id="levelFormat">—</div>
          </div>
        </div>
      </div>

      <!-- 핵심 키워드 -->
      <div class="task-section">
        <h2>🏷️ 핵심 키워드</h2>
        <div class="keywords" id="keywordsArea"></div>
      </div>

      <!-- AI 피드백 -->
      <div class="task-section">
        <h2>💬 선생님의 피드백</h2>
        <div class="feedback-box" id="feedbackBox">
          피드백을 불러오는 중...
        </div>
      </div>
<!-- 성장 질문 섹션 -->
<div class="task-section" id="growthSection">
  <h2>🌿 더 깊이 생각해보기</h2>
  <p class="task-desc">AI 선생님이 오늘 네 결과를 보고 질문을 준비했어!</p>

  <!-- 질문 로딩 -->
  <div id="growthLoading" class="loading-msg">
    <span class="spinner"></span> 질문을 준비하는 중...
  </div>

  <!-- 대화 영역 -->
  <div id="growthChat" class="hidden">
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
      <textarea
        id="chatInput"
        placeholder="여기에 답변을 써주세요..."
        rows="3"
      ></textarea>
      <button id="chatSendBtn" class="submit-btn" style="padding:12px 28px; font-size:0.95rem; margin-top:10px; width:100%;">
        💬 답변 보내기
      </button>
    </div>
  </div>

  <!-- 최종 성찰 한 줄 -->
  <div id="finalReflection" class="hidden">
    <div class="reflection-complete">
      <div style="font-size:2rem; margin-bottom:8px;">✨</div>
      <h3 style="color:#166534; margin-bottom:8px;">오늘의 성찰 한 줄</h3>
      <div id="reflectionText" class="feedback-box" style="text-align:center; font-weight:500;"></div>
    </div>
  </div>
</div>

      <!-- 다시 작성 버튼 -->
      <div style="text-align:center;">
      <button class="retry-btn" onclick="location.href='/'">
        🌱 다시 작성하기
      </button>
      <br/>
      <a href="/teacher.html"
        style="display:inline-block; margin-top:12px; font-size:0.85rem; color:#9ca3af;">
    🔐 교사용 페이지
  </a>
    </div>

    <script type="module" src="/src/result.js"></script>
  </body>
</html>
